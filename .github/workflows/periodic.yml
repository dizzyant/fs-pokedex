name: Periodic Health Check
on:
    workflow_dispatch:
    schedule:
        - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
    - name: check the deployed service URL
      uses: jtalk/url-health-check-action@v5
      with:
        url: https://fs-pokedex-4te-zw.fly.dev/
